<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP Camera View</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <div class="glass-panel">
      <header>
        <div class="header-left">
          <div class="pulse-dot"></div>
          <h1>Live Video Stream</h1>
        </div>
        <div class="status-indicator disconnected" id="statusText">Disconnected</div>
      </header>

      <div class="video-container">
        <!-- Placeholder graphic when disconnected -->
        <div class="video-placeholder" id="videoPlaceholder">
          <svg class="camera-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
          </svg>
          <p>Stream Offline</p>
        </div>
        <!-- Actual video element (uses img for MJPEG streaming) -->
        <img id="videoStream" class="hidden" alt="Live Camera Stream">
      </div>

      <div class="controls">
        <button id="connectBtn" class="btn primary">
          <span>Connect</span>
        </button>
        <button id="disconnectBtn" class="btn secondary" disabled>
          <span>Disconnect</span>
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
